# ─── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name api-songkran-aotsvb.continue-labs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Backend API (HTTPS) ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name api-songkran-aotsvb.continue-labs.com;

    ssl_certificate /etc/letsencrypt/live/api-songkran-aotsvb.continue-labs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-songkran-aotsvb.continue-labs.com/privkey.pem;

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
