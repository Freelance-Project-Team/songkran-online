services:
    frontend:
        build:
            context: ./songkran-online-client
            dockerfile: Dockerfile
        container_name: songkran-frontend
        restart: always
        environment:
            - NODE_ENV=production
            - NEXT_PUBLIC_API_URL=https://api.songkranonline.com
        networks:
            - songkran-network
        depends_on:
            - backend

    backend:
        build:
            context: ./songkran-online-api
            dockerfile: Dockerfile
        container_name: songkran-backend
        restart: always
        env_file:
            - ./songkran-online-api/.env
        expose:
            - 4000
        networks:
            - songkran-network
        depends_on:
            - db

    db:
        image: postgres:16-alpine
        container_name: songkran-db
        restart: always
        environment:
            - POSTGRES_USER=user
            - POSTGRES_PASSWORD=password
            - POSTGRES_DB=songkran-online
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - '4900:5432'
        networks:
            - songkran-network

    nginx:
        image: nginx:alpine
        container_name: songkran-nginx
        restart: always
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        networks:
            - songkran-network
        depends_on:
            - frontend
            - backend

networks:
    songkran-network:
        driver: bridge

volumes:
    postgres_data:
